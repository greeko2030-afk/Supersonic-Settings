name: Build Supersonic-settings Mod (MC 1.20.1)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Supersonic-settings (1.20.1)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.8
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.8'

    - name: Fix Capitalized File Names
      run: |
        mv Settings.gradle settings.gradle 2>/dev/null || true
        mv Gradle.properties gradle.properties 2>/dev/null || true

    - name: Generate configurations and code
      run: |
        echo "Creating settings.gradle..."
        echo "$SETTINGS_CONTENT" > settings.gradle

        echo "Creating build.gradle..."
        echo "$BUILD_CONTENT" > build.gradle

        echo "Creating fabric.mod.json..."
        mkdir -p src/main/resources
        echo "$FABRIC_JSON_CONTENT" > src/main/resources/fabric.mod.json

        echo "Creating Client Entrypoint..."
        mkdir -p src/main/java/net/supersonic
        if [ ! -f "src/main/java/net/supersonic/SupersonicClient.java" ]; then
          echo "$JAVA_CONTENT" > src/main/java/net/supersonic/SupersonicClient.java
        fi
      env:
        SETTINGS_CONTENT: |
          pluginManagement {
              repositories {
                  maven { url = "https://maven.fabricmc.net/" }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "Supersonic-Settings"
        
        BUILD_CONTENT: |
          plugins {
              id 'fabric-loom' version '1.6-SNAPSHOT'
              id 'maven-publish'
          }
          version = "1.0.0"
          group = "net.supersonic"
          repositories {
              mavenCentral()
          }
          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.2+1.20.1"
          }
          processResources {
              inputs.property "version", project.version
              filesMatching("fabric.mod.json") {
                  expand "version": project.version
              }
          }
          tasks.withType(JavaCompile).configureEach {
              it.options.release = 17
          }
          java {
              withSourcesJar()
              sourceCompatibility = JavaVersion.VERSION_17
              targetCompatibility = JavaVersion.VERSION_17
          }
        
        FABRIC_JSON_CONTENT: |
          {
            "schemaVersion": 1,
            "id": "supersonicsettings",
            "version": "1.0.0",
            "name": "Supersonic Settings",
            "description": "Custom Settings GUI Mod for Minecraft",
            "authors": ["greeko20"],
            "contact": {},
            "license": "MIT",
            "icon": "assets/supersonicsettings/icon.png",
            "environment": "*",
            "entrypoints": {
              "client": [
                "net.supersonic.SupersonicClient"
              ]
            },
            "depends": {
              "fabricloader": ">=0.15.11",
              "minecraft": "~1.20.1",
              "java": ">=17"
            }
          }
        
        JAVA_CONTENT: |
          package net.supersonic;
          
          import net.fabricmc.api.ClientModInitializer;
          import org.slf4j.Logger;
          import org.slf4j.LoggerFactory;
          
          public class SupersonicClient implements ClientModInitializer {
              public static final Logger LOGGER = LoggerFactory.getLogger("supersonicsettings");
          
              @Override
              public void onInitializeClient() {
                  LOGGER.info("Supersonic Settings Mod loaded successfully!");
              }
          }

    - name: Build Mod
      run: |
        echo "Building..."
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.8
        fi
        chmod +x gradlew
        ./gradlew build --stacktrace

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-Settings-1.20.1
        path: '**/build/libs/*.jar'
        if-no-files-found: error
