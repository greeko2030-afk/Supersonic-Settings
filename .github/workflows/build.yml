name: Build Supersonic-settings Mod (MC 1.20.1)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Supersonic-settings (1.20.1)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.8
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.8'

    - name: Force Overwrite Project Files
      run: |
        echo "Forcing correct settings.gradle and gradle.properties to prevent NullPointerException..."
        
        # Overwrite settings.gradle
        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                maven {
                    name = "Fabric"
                    url = "https://maven.fabricmc.net/"
                }
                mavenCentral()
                gradlePluginPortal()
            }
        }
        rootProject.name = "Supersonic-settings"
        EOF

        # Overwrite gradle.properties with essential Fabric variables
        cat <<EOF > gradle.properties
        org.gradle.jvmargs=-Xmx1G
        org.gradle.parallel=true
        
        minecraft_version=1.20.1
        yarn_mappings=1.20.1+build.10
        loader_version=0.15.11
        fabric_version=0.92.2+1.20.1
        
        mod_version=1.0.0
        maven_group=com.greeko.supersonic
        archives_base_name=Supersonic-settings
        EOF

    - name: Generate Wrapper and Build Mod
      run: |
        echo "Setting up environment for Minecraft 1.20.1..."
        
        if [ ! -f "gradlew" ]; then
          echo "Generating Gradle wrapper..."
          gradle wrapper --gradle-version 8.8
        fi

        chmod +x gradlew
        
        ./gradlew build --refresh-dependencies --stacktrace

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-settings-1.20.1
        path: '**/build/libs/*.jar'
        if-no-files-found: error
