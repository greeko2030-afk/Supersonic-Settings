name: Build Supersonic-settings Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Supersonic-settings (1.20.1)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.8
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.8'

    - name: Fix Missing Project Files and Fabric JSON
      run: |
        echo "Creating necessary project files if missing or empty..."

        # 1. Overwrite settings.gradle
        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                maven {
                    name = "Fabric"
                    url = "https://maven.fabricmc.net/"
                }
                mavenCentral()
                gradlePluginPortal()
            }
        }
        rootProject.name = "Supersonic-settings"
        EOF

        # 2. Overwrite gradle.properties
        cat <<EOF > gradle.properties
        org.gradle.jvmargs=-Xmx1G
        org.gradle.parallel=true
        
        minecraft_version=1.20.1
        yarn_mappings=1.20.1+build.10
        loader_version=0.15.11
        fabric_version=0.92.2+1.20.1
        
        mod_version=1.0.0
        maven_group=com.greeko.supersonic
        archives_base_name=Supersonic-settings
        EOF

        # 3. Ensure src/main/resources/fabric.mod.json exists and is valid JSON
        mkdir -p src/main/resources
        FABRIC_JSON="src/main/resources/fabric.mod.json"
        
        if [ ! -s "$FABRIC_JSON" ]; then
          echo "fabric.mod.json is missing or empty! Creating a valid fabric.mod.json..."
          cat <<EOF > "$FABRIC_JSON"
        {
          "schemaVersion": 1,
          "id": "supersonic_settings",
          "version": "1.0.0",
          "name": "Supersonic-settings",
          "description": "Supersonic Settings Mod for Minecraft 1.20.1",
          "authors": ["greeko20"],
          "license": "MIT",
          "environment": "*",
          "entrypoints": {},
          "depends": {
            "fabricloader": ">=0.15.11",
            "minecraft": "~1.20.1",
            "java": ">=17"
          }
        }
        EOF
        fi

    - name: Generate Wrapper and Build Mod
      run: |
        echo "Setting up Gradle wrapper and building..."
        
        if [ ! -f "gradlew" ]; then
          echo "Generating Gradle wrapper..."
          gradle wrapper --gradle-version 8.8
        fi

        chmod +x gradlew
        ./gradlew build --refresh-dependencies --stacktrace

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-settings-1.20.1
        path: '**/build/libs/*.jar'
        if-no-files-found: error
