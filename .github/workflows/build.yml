name: Build Supersonic-settings Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Supersonic-settings
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Supersonic-settings Mod
      run: |
        echo "Searching for build.gradle in the repository..."
        
        # Search for build.gradle or build.gradle.kts anywhere in the repository
        BUILD_FILE=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)

        if [ -z "$BUILD_FILE" ]; then
          echo "=========================================================="
          echo "ERROR: 'build.gradle' file was NOT found in the repository!"
          echo "Please push your source code and build.gradle to GitHub."
          echo "=========================================================="
          exit 1
        fi

        PROJECT_DIR=$(dirname "$BUILD_FILE")
        echo "Found Supersonic-settings project in directory: $PROJECT_DIR"
        cd "$PROJECT_DIR"

        if [ -f "gradlew" ]; then
          echo "Executing gradlew wrapper..."
          chmod +x gradlew
          ./gradlew build
        else
          echo "gradlew wrapper not found. Using system Gradle..."
          gradle build
        fi

    - name: Upload Supersonic-settings Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-settings
        path: '**/build/libs/*.jar'
        if-no-files-found: error
