name: Build Mod (Java 21)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Find and Grant Executable Permission to gradlew
      run: |
        find . -name "gradlew" -exec chmod +x {} +

    - name: Build with Gradle
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -n "$GRADLEW_PATH" ]; then
          DIR=$(dirname "$GRADLEW_PATH")
          echo "Found gradlew in $DIR. Building..."
          cd "$DIR" && ./gradlew build
        else
          echo "gradlew not found! Falling back to system gradle..."
          gradle build
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Mod-Build-Artifacts
        path: '**/build/libs/*.jar'
        if-no-files-found: error
