name: Build Mod (Java 21)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Auto-Detect and Build
      run: |
        # Searching for the build.gradle or build.gradle.kts file
        BUILD_FILE=$(find . -maxdepth 3 -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        
        if [ -z "$BUILD_FILE" ]; then
          echo "Error: 'build.gradle' file was not found anywhere in your repository!"
          echo "Please make sure you have pushed your Minecraft project files correctly to GitHub."
          exit 1
        fi
        
        DIR=$(dirname "$BUILD_FILE")
        echo "Found project in directory: $DIR"
        cd "$DIR"
        
        if [ -f "gradlew" ]; then
          echo "Found gradlew wrapper. Executing..."
          chmod +x gradlew
          ./gradlew build
        else
          echo "gradlew not found. Executing system gradle..."
          gradle build
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-settings
        path: '**/build/libs/*.jar'
        if-no-files-found: error
