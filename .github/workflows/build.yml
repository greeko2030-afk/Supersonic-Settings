name: Build Supersonic-settings Mod (MC 1.20.1)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Supersonic-settings (1.20.1)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.8
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.8'

    - name: Fix Case Sensitivity and Missing Files
      run: |
        echo "Checking repository files..."
        
        # Linux is case-sensitive. Rename Gradle.properties to gradle.properties if it exists.
        if [ -f "Gradle.properties" ]; then
          echo "Found uppercase Gradle.properties! Renaming to lowercase..."
          mv Gradle.properties gradle.properties
        fi

        # Create settings.gradle if it is completely missing
        if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
          echo "Creating default settings.gradle..."
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  maven {
                      name = "Fabric"
                      url = "https://maven.fabricmc.net/"
                  }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "Supersonic-settings"
        EOF
        fi

    - name: Generate Wrapper and Build Mod
      run: |
        echo "Setting up environment for Minecraft 1.20.1..."
        
        if [ ! -f "gradlew" ]; then
          echo "Generating Gradle wrapper..."
          gradle wrapper --gradle-version 8.8
        fi

        chmod +x gradlew
        
        # Using --refresh-dependencies to clear out any corrupted Loom caches
        ./gradlew build --refresh-dependencies --stacktrace

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-settings-1.20.1
        path: '**/build/libs/*.jar'
        if-no-files-found: error
