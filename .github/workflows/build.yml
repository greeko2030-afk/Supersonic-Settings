name: Build Supersonic-settings Mod (MC 1.20.1)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Supersonic-settings (1.20.1)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.8
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.8'

    - name: Ensure All Required Mod Files Exist
      run: |
        echo "Validating and setting up project environment..."

        # 1. Force valid settings.gradle
        cat <<'EOF' > settings.gradle
        pluginManagement {
            repositories {
                maven {
                    name = "Fabric"
                    url = "https://maven.fabricmc.net/"
                }
                mavenCentral()
                gradlePluginPortal()
            }
        }
        rootProject.name = "Supersonic-settings"
        EOF

        # 2. Force valid gradle.properties
        cat <<'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2G
        org.gradle.parallel=true

        minecraft_version=1.20.1
        yarn_mappings=1.20.1+build.10
        loader_version=0.15.11
        fabric_version=0.92.2+1.20.1

        mod_version=1.0.0
        maven_group=com.greeko.supersonic
        archives_base_name=Supersonic-settings
        EOF

        # 3. Create build.gradle if missing or empty
        if [ ! -s "build.gradle" ]; then
          echo "build.gradle is missing or empty! Creating default build.gradle..."
          cat <<'EOF' > build.gradle
          plugins {
              id 'fabric-loom' version '1.6-SNAPSHOT'
              id 'maven-publish'
          }

          version = project.mod_version
          group = project.maven_group

          repositories {
              mavenCentral()
          }

          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
          }

          processResources {
              inputs.property "version", project.version
              filesMatching("fabric.mod.json") {
                  expand "version": project.version
              }
          }

          tasks.withType(JavaCompile).configureEach {
              it.options.release = 17
          }

          java {
              withSourcesJar()
              sourceCompatibility = JavaVersion.VERSION_17
              targetCompatibility = JavaVersion.VERSION_17
          }
          EOF
        fi

        # 4. Ensure src/main/resources/fabric.mod.json exists
        mkdir -p src/main/resources
        if [ ! -s "src/main/resources/fabric.mod.json" ]; then
          echo "fabric.mod.json is missing or empty! Generating default JSON..."
          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "supersonic_settings",
            "version": "${version}",
            "name": "Supersonic-settings",
            "description": "Supersonic Settings Mod for Minecraft 1.20.1",
            "authors": ["greeko20"],
            "license": "MIT",
            "environment": "*",
            "entrypoints": {},
            "depends": {
              "fabricloader": ">=0.15.11",
              "minecraft": "~1.20.1",
              "java": ">=17"
            }
          }
          EOF
        fi

    - name: Generate Wrapper and Build Mod
      run: |
        echo "Building Minecraft mod..."

        if [ ! -f "gradlew" ]; then
          echo "Generating Gradle wrapper..."
          gradle wrapper --gradle-version 8.8
        fi

        chmod +x gradlew
        ./gradlew build --stacktrace

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-settings-1.20.1
        path: '**/build/libs/*.jar'
        if-no-files-found: error
