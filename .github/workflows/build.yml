name: Build Supersonic-settings Mod (MC 1.20.1)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Supersonic-settings (1.20.1)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Minecraft 1.20.1 requires Java 17
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Setup Gradle 8.8 specifically for Minecraft Loom compatibility
    - name: Setup Gradle 8.8
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.8'

    - name: Generate Wrapper and Build Mod
      run: |
        echo "Setting up environment for Minecraft 1.20.1..."
        
        # If gradlew wrapper is missing, generate Gradle 8.8 wrapper automatically
        if [ ! -f "gradlew" ]; then
          echo "gradlew wrapper missing! Generating Gradle 8.8 wrapper..."
          gradle wrapper --gradle-version 8.8
        fi

        chmod +x gradlew
        ./gradlew build --stacktrace

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Supersonic-settings-1.20.1
        path: '**/build/libs/*.jar'
        if-no-files-found: error
